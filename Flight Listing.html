<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golobe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./assest/css/Flight Listing.css">
</head>

<body>
    <header>
        <nav>
            <div class="div1">
                <div class="b">
                    <div class="i">
                        <i class="fa-solid fa-plane"></i>
                        <a href="#">Favourites</a>
                    </div>
                    <div class="a">
                        <i class="fa-solid fa-bed"></i>
                        <a href="#">Find Stays</a>
                    </div>
                </div>
                <div>
                    <a href=" #"><img src="./assest/img/logo.png" alt=""></a>
                </div>

            </div>
            <div class="div2">
                <div>
                    <i class="fa-solid fa-heart"></i>
                    <a href="#">Favourites</a>
                </div>
                <div>
                    <img src="./assest/img/odam.jpg" alt="">
                    <a href="#">John D.</a>
                </div>
            </div>

        </nav>
    </header>
    <!-- =========form====== -->
    <!-- =================== -->
    <form action="#">
        <fieldset>
            <legend>From-to</legend>
            <input type="text" name="" id="" placeholder="Lahore - Karache" />
            <i class="fa-solid fa-right-left"></i>
        </fieldset>
        <fieldset>
            <legend>Trip</legend>
            <select name="" id="">
                <option value="return">Return</option>
                <option value="to_go">To go</option>
            </select>
        </fieldset>
        <fieldset>
            <legend>Depart-Return</legend>
            <input type="date" name="" id="" />
            <span> - </span>
            <input type="date" name="" id="" />
        </fieldset>
        <fieldset>
            <legend>Passenger-Class</legend>
            <input type="text" name="" id="" placeholder="1 Passenger, Economy" />
        </fieldset>
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
    </form>
    <!-- =======filters======== -->
    <!-- ====================== -->
    <div class="filters">
        <div class="filter">
            <h3>Filters</h3>
            <details>
                <summary>Price</summary>
                <input type="range" name="" id="" />
                <ul>
                    <li>$50</li>
                    <li>$1200</li>
                </ul>
            </details>
            <details>
                <summary>Departure Time</summary>
                <input type="range" name="" id="" />
                <ul>
                    <li>12:01 AM</li>
                    <li>11:56 PM</li>
                </ul>
            </details>
            <details>
                <summary>Rating</summary>
                <button>0+</button>
                <button>1+</button>
                <button>2+</button>
                <button>3+</button>
                <button>4+</button>
            </details>
            <details>
                <summary>Airlens</summary>
                <label for="em"><input type="checkbox" name="" id="em" /> Emirated</label>
                <label for="em"><input type="checkbox" name="" id="em" /> Emirated</label>
                <label for="em"><input type="checkbox" name="" id="em" /> Emirated</label>
                <label for="em"><input type="checkbox" name="" id="em" /> Emirated</label>
            </details>
            <details>
                <summary>Trips</summary>
                <label for="em"><input type="checkbox" name="" id="em" /> Round trip</label>
                <label for="em"><input type="checkbox" name="" id="em" /> Emirated</label>
                <label for="em"><input type="checkbox" name="" id="em" /> Emirated</label>
                <label for="em"><input type="checkbox" name="" id="em" /> Emirated</label>
            </details>
        </div>
        <div class="line"></div>
        <div class="filter-cards">
            <div class="filter-sort">
                <div class="filter-sort-card">
                    <h3>Cheapest</h3>
                    <span>$99 . 2h 18m</span>
                </div>
                <div class="filter-sort-line"></div>
                <div class="filter-sort-card">
                     <h3>Best</h3>
                    <span>$99 . 2h 18m</span>
                </div>
                <div class="filter-sort-line"></div>
                <div class="filter-sort-card">
                    <h3>Quickest</h3>
                     <span>$99 . 2h 18m</span>

                </div>
                <div class="filter-sort-line"></div>
                <div class="filter-sort-othercard">
                    <span><i class="fa-solid fa-bars"></i>Other sort</span>
                </div>
                
            </div>
        </div>
    </div>


</body>

</html>
