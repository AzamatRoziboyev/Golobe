<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golobe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./assest/css/Flight Listing.css">
</head>

<body>
    <header>
        <nav>
            <div class="div1">
                <div>
                    <i class="fa-solid fa-plane"></i>
                    <a href="#">Favourites</a>
                    <i class="fa-solid fa-bed"></i>
                    <a href="#">Find Stays</a>
                </div>
                <div>
                    <a href=" #"><img src="./assest/img/logo.png" alt=""></a>
                </div>

            </div>
            <div class="div2">
                <div>
                    <i class="fa-solid fa-heart"></i>
                    <a href="#">Favourites</a>
                </div>
                <div>
                    <img src="./assest/img/odam.jpg" alt="">
                    <a href="#">John D.</a>
                </div>
            </div>

        </nav>
    </header>
    <!-- =========form====== -->
    <!-- =================== -->
    <form action="#">
        <fieldset>
            <legend>From-to</legend>
            <input type="text" name="" id="" placeholder="Lahore - Karache" />
            <i class="fa-solid fa-right-left"></i>
        </fieldset>
        <fieldset>
            <legend>Trip</legend>
            <select name="" id="">
                <option value="return">Return</option>
                <option value="to_go">To go</option>
            </select>
        </fieldset>
        <fieldset>
            <legend>Depart-Return</legend>
            <input type="date" name="" id="" />
            <span> - </span>
            <input type="date" name="" id="" />
        </fieldset>
        <fieldset>
            <legend>Passenger-Class</legend>
            <input type="text" name="" id="" placeholder="1 Passenger, Economy" />
        </fieldset>
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
    </form>
</body>

</html>
